name: Build, Test, and Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      USE_TESTCONTAINERS: true
    strategy:
      matrix:
        dotnet: [ '6.0.x', '8.0.x', '9.0.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Debug - List directory structure
      run: |
        echo "Root directory contents:"
        ls -la
        echo ""
        echo "Checkpoint.NET directory contents:"
        ls -la ./Checkpoint.NET || echo "Checkpoint.NET folder does not exist"
        echo ""
        echo "Looking for .sln files:"
        find . -name "*.sln" -type f
      shell: bash

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}

    - name: Restore dependencies
      run: dotnet restore Checkpoint.NET/Checkpoint.NET/Checkpoint.NET.csproj

    - name: Build
      run: dotnet build Checkpoint.NET/Checkpoint.NET/Checkpoint.NET.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test Checkpoint.NET/Checkpoint.NET/Checkpoint.NET.csproj --no-build --configuration Release --verbosity normal

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Display tag version
      run: echo "Tag version = ${GITHUB_REF#refs/tags/v}"

    - name: Pack NuGet package
      run: |
        dotnet pack Checkpoint.NET/Checkpoint.NET/Checkpoint.NET.csproj \
          --configuration Release \
          --output ./nupkgs \
          -p:PackageVersion="${GITHUB_REF#refs/tags/v}" \
          -p:IncludeSymbols=false \
          -p:IncludeSource=false
      shell: bash

    - name: List nupkg files
      run: |
        echo "Contents of ./nupkgs:"
        ls -la ./nupkgs || echo "Directory does not exist or is empty"
      shell: bash

    - name: Push to NuGet.org
      run: |
        for pkg in ./nupkgs/*.nupkg; do
          if [ -f "$pkg" ]; then
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "No .nupkg files found in ./nupkgs/"
            exit 1
          fi
        done
      shell: bash